name: Build Android Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create missing Android platform files
        run: flutter create --platforms=android .

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release --split-per-abi > build_log.txt 2>&1 || (cat build_log.txt && exit 1)

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log
          path: build_log.txt

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*-release.apk
